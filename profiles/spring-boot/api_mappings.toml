[annotations]
"RestController" = "axum Router + handler functions"
"Controller" = "axum Router + handler functions"
"GetMapping" = ".route(path, get(handler))"
"PostMapping" = ".route(path, post(handler))"
"PutMapping" = ".route(path, put(handler))"
"DeleteMapping" = ".route(path, delete(handler))"
"RequestMapping" = ".route(path, method_router)"
"PathVariable" = "axum::extract::Path"
"RequestBody" = "axum::extract::Json"
"RequestParam" = "axum::extract::Query"
"Autowired" = "axum::extract::State or function argument"
"Service" = "plain struct"
"Component" = "plain struct"
"Repository" = "plain struct with database methods"
"Configuration" = "module with pub functions"
"Bean" = "pub function returning instance"
"Transactional" = "sea_orm::TransactionTrait"
"Scheduled" = "tokio::spawn + tokio::time::interval"
"Value" = "std::env::var or config struct"

[types]
"ResponseEntity" = "axum::response::IntoResponse"
"HttpStatus" = "axum::http::StatusCode"
"ModelAndView" = "(StatusCode, Html<String>)"
"RedirectView" = "axum::response::Redirect"

[dependencies]
framework = "axum"
runtime = "tokio"
serialization = "serde + serde_json"
database = "sea-orm"
middleware = "tower"
validation = "validator"
